name: ✨ Feature request
description: Suggest an improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The product is a **local-first, no-upload** AI-usage monitor with a desktop pet. Requests that
        would upload usage data, add accounts/telemetry, or send data to third-party services are
        generally out of scope — see the Product direction in the README.
  - type: textarea
    id: problem
    attributes:
      label: The problem / job to be done
      description: What are you trying to accomplish? (Not just the proposed solution.)
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea (optional)
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      options:
        - label: This keeps usage data local (no upload / no telemetry / no account required).
          required: false
